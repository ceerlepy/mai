name = "mai"
main = "src/index.js"
compatibility_date = "2026-07-01"
workers_dev = true

[ai]
binding = "AI"

[vars]
# brave  -> Search planı + LLM Context endpoint (p90 <600ms). Aylık $5 kredi ~1000 sorgu.
#           DİKKAT: Answers planını KULLANMA, ortalama 4.5sn.
# serper -> $0.30/1000, kayıtta 2500 ücretsiz
# exa / tavily / none
SEARCH_PROVIDER = "brave"

# Niyet kontrolü ile arama paralel mi koşsun, seri mi?
#   "false" (varsayılan) -> paralel. Gecikme değişmez, ama niyet "hayır"
#                           derse yapılmış arama çöpe gider (para kaybı).
#   "true"               -> seri. Boşa arama yok, +200 ms gecikme.
# Arama kotan sıkışırsa "true" yap.
INTENT_BEFORE_SEARCH = "false"

# ---- KV cache (tavsiye edilir) --------------------------------------
# Aynı soru tekrar gelirse ~20ms, arama ücreti de ödenmez.
#   npx wrangler kv namespace create CACHE
# [[kv_namespaces]]
# binding = "CACHE"
# id = "BURAYA_KV_ID"
[[kv_namespaces]]
binding = "CACHE"
id = "5b93bf73843345febd465f4ed008f394"

# ---- Vectorize: yerel bilgi tabanı (ASIL KAZANÇ) --------------------
# Enflasyon, asgari ücret, nüfus gibi yarı-güncel sayısalları önceden
# yükle -> ~80ms'de cevaplanır, web aramasına HİÇ gidilmez.
# Arama hacmini ~10 kat düşürür, ücretsiz kredi rahat yeter.
#   npx wrangler vectorize create mai --dimensions=1024 --metric=cosine
# [[vectorize]]
# binding = "VEC"
# index_name = "mai"
[[vectorize]]
binding = "VEC"
index_name = "mai"

# invocation_logs: her istek için otomatik bir satır (yol, durum, süre).
# Kod içindeki console.log çıktıları da buraya akar.
# Canlı izlemek için:  cd worker && npx wrangler tail
# (kök dizinden çalıştırırsan "Worker name missing" hatası alırsın,
#  çünkü wrangler.toml worker/ içinde. Alternatif: npx wrangler tail mai)
[observability.logs]
enabled = true
invocation_logs = true
