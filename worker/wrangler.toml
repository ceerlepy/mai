name = "teyit-asistani"
main = "src/index.js"
compatibility_date = "2026-07-01"
workers_dev = true

[ai]
binding = "AI"

[vars]
# brave  -> Search planı + LLM Context endpoint (p90 <600ms). Aylık $5 kredi ~1000 sorgu.
#           DİKKAT: Answers planını KULLANMA, ortalama 4.5sn.
# serper -> $0.30/1000, kayıtta 2500 ücretsiz
# exa / tavily / none
SEARCH_PROVIDER = "brave"

# ---- KV cache (tavsiye edilir) --------------------------------------
# Aynı soru tekrar gelirse ~20ms, arama ücreti de ödenmez.
#   npx wrangler kv namespace create CACHE
# [[kv_namespaces]]
# binding = "CACHE"
# id = "BURAYA_KV_ID"

# ---- Vectorize: yerel bilgi tabanı (ASIL KAZANÇ) --------------------
# Enflasyon, asgari ücret, nüfus gibi yarı-güncel sayısalları önceden
# yükle -> ~80ms'de cevaplanır, web aramasına HİÇ gidilmez.
# Arama hacmini ~10 kat düşürür, ücretsiz kredi rahat yeter.
#   npx wrangler vectorize create teyit-bilgi --dimensions=1024 --metric=cosine
# [[vectorize]]
# binding = "VEC"
# index_name = "teyit-bilgi"

[observability]
enabled = true
